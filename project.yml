name: Notcher
options:
  bundleIdPrefix: com.notcher
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

targets:
  Notcher:
    type: application
    platform: macOS
    sources:
      - path: Notcher
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Notcher/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.notcher.app
        PRODUCT_NAME: Notcher
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: Notcher/Notcher.entitlements
      properties:
        com.apple.security.app-sandbox: false
